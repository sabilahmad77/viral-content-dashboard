[build]
builder = "nixpacks"
buildCommand = "npm install && ./node_modules/.bin/prisma generate && npm run build"

[deploy]
startCommand = "sh -c './node_modules/.bin/prisma db push --accept-data-loss 2>&1 || true; node dist/lib/seed.js 2>&1 || true; exec node dist/index.js'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 120
